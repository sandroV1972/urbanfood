<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfShack - Ricerca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>

    <div class="container py-5">
        <h2 class="section-title">Ricerca</h2>
        <p class="section-subtitle">Trova ristoranti o piatti</p>

        <ul class="nav nav-tabs mb-4" id="searchTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-restaurants" data-bs-toggle="tab" data-bs-target="#pane-restaurants" type="button" role="tab">
                    <i class="bi bi-shop me-1"></i>Ristoranti
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-dishes" data-bs-toggle="tab" data-bs-target="#pane-dishes" type="button" role="tab">
                    <i class="bi bi-egg-fried me-1"></i>Piatti
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Tab Ristoranti -->
            <div class="tab-pane fade show active" id="pane-restaurants" role="tabpanel">
                <form id="searchRestaurantForm" class="p-4 rounded-4 mb-4" style="background: var(--ss-navy-light);">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="rName" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="rName" placeholder="es. SurfShack">
                        </div>
                        <div class="col-md-4">
                            <label for="rAddress" class="form-label">Indirizzo</label>
                            <input type="text" class="form-control" id="rAddress" placeholder="es. Lerici, Via Roma">
                        </div>
                        <div class="col-md-4">
                            <label for="rCuisine" class="form-label">Tipo di cucina</label>
                            <input type="text" class="form-control" id="rCuisine" placeholder="es. Italian, Burger, Beef">
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn-add">
                                <i class="bi bi-search me-1"></i>Cerca ristoranti
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Tab Piatti -->
            <div class="tab-pane fade" id="pane-dishes" role="tabpanel">
                <form id="searchDishForm" class="p-4 rounded-4 mb-4" style="background: var(--ss-navy-light);">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="dName" class="form-label">Nome piatto</label>
                            <input type="text" class="form-control" id="dName" placeholder="es. Pizza, Burger">
                        </div>
                        <div class="col-md-4">
                            <label for="dCategory" class="form-label">Categoria / Cucina</label>
                            <input type="text" class="form-control" id="dCategory" placeholder="es. Beef, Pasta, Italian">
                        </div>
                        <div class="col-md-2">
                            <label for="dMinPrice" class="form-label">Prezzo min</label>
                            <input type="number" min="0" step="0.5" class="form-control" id="dMinPrice" placeholder="0">
                        </div>
                        <div class="col-md-2">
                            <label for="dMaxPrice" class="form-label">Prezzo max</label>
                            <input type="number" min="0" step="0.5" class="form-control" id="dMaxPrice" placeholder="50">
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn-add">
                                <i class="bi bi-search me-1"></i>Cerca piatti
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div id="resultsContainer" class="row g-4"></div>
        <p id="noResults" class="text-center mt-5 d-none" style="color: var(--ss-gray);"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const role = JSON.parse(atob(token.split('.')[1])).usrType;
        if (role !== 'cliente') window.location.href = '/';

        const resultsContainer = document.getElementById('resultsContainer');
        const noResults = document.getElementById('noResults');

        function showNoResults(message) {
            resultsContainer.innerHTML = '';
            noResults.textContent = message;
            noResults.classList.remove('d-none');
        }

        function renderRestaurants(restaurants) {
            if (restaurants.length === 0) {
                showNoResults('Nessun ristorante trovato.');
                return;
            }
            noResults.classList.add('d-none');
            resultsContainer.innerHTML = restaurants.map(r => `
                <div class="col-6 col-md-4 col-lg-3">
                    <a href="/restaurant-order/${r._id}" class="text-decoration-none">
                        <div class="restaurant-card card h-100">
                            <img src="${r.image || ''}" class="card-img-top" alt="${r.name}">
                            <div class="card-body">
                                <h5 class="card-title">${r.name}</h5>
                                <p class="card-text small mb-0">
                                    <i class="bi bi-geo-alt me-1"></i>${r.address}
                                </p>
                            </div>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        function renderDishes(items) {
            if (items.length === 0) {
                showNoResults('Nessun piatto trovato.');
                return;
            }
            noResults.classList.add('d-none');
            resultsContainer.innerHTML = items.map(it => `
                <div class="col-6 col-md-4 col-lg-3">
                    <a href="/restaurant-order/${it.restaurant?._id || ''}" class="text-decoration-none">
                        <div class="restaurant-card card h-100">
                            <img src="${it.strMealThumb || ''}" class="card-img-top" alt="${it.strMeal}">
                            <div class="card-body">
                                <h5 class="card-title">${it.strMeal}</h5>
                                <p class="card-text small mb-1">
                                    <i class="bi bi-shop me-1"></i>${it.restaurant?.name || 'Ristorante'}
                                </p>
                                <p class="card-text fw-bold mb-0" style="color: var(--ss-teal);">
                                    €${it.price.toFixed(2)}
                                </p>
                            </div>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        async function searchRestaurants() {
            const params = new URLSearchParams();
            const name    = document.getElementById('rName').value.trim();
            const address = document.getElementById('rAddress').value.trim();
            const cuisine = document.getElementById('rCuisine').value.trim();

            if (name)    params.set('name', name);
            if (address) params.set('address', address);
            if (cuisine) params.set('cuisine', cuisine);

            const res = await fetch(`/api/restaurants/search?${params.toString()}`);
            if (!res.ok) {
                showNoResults('Errore nella ricerca');
                return;
            }
            renderRestaurants(await res.json());
        }

        async function searchDishes() {
            const params = new URLSearchParams();
            const name     = document.getElementById('dName').value.trim();
            const category = document.getElementById('dCategory').value.trim();
            const minPrice = document.getElementById('dMinPrice').value;
            const maxPrice = document.getElementById('dMaxPrice').value;

            if (name)     params.set('name', name);
            if (category) params.set('category', category);
            if (minPrice) params.set('minPrice', minPrice);
            if (maxPrice) params.set('maxPrice', maxPrice);

            const res = await fetch(`/api/menu-items/search?${params.toString()}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) {
                showNoResults('Errore nella ricerca');
                return;
            }
            renderDishes(await res.json());
        }

        document.getElementById('searchRestaurantForm').addEventListener('submit', (e) => {
            e.preventDefault();
            searchRestaurants();
        });
        document.getElementById('searchDishForm').addEventListener('submit', (e) => {
            e.preventDefault();
            searchDishes();
        });

        // Pulisci risultati al cambio tab (per evitare risultati di un tipo mostrati nell'altro tab)
        document.querySelectorAll('#searchTabs button').forEach(btn => {
            btn.addEventListener('shown.bs.tab', () => {
                resultsContainer.innerHTML = '';
                noResults.classList.add('d-none');
            });
        });

        // Se l'URL contiene ?category=X (es. cliccando una card categoria in home),
        // attiva la tab Piatti, precompila il filtro e lancia subito la ricerca.
        const params = new URLSearchParams(window.location.search);
        const initialCategory = params.get('category');
        if (initialCategory) {
            new bootstrap.Tab(document.getElementById('tab-dishes')).show();
            document.getElementById('dCategory').value = initialCategory;
            searchDishes();
        }
    </script>
</body>
</html>
