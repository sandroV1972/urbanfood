<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfShack - Ordini ricevuti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="navbar"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-end flex-wrap mb-4 gap-2">
            <h2 class="section-title mb-0">Ordini ricevuti</h2>
            <div class="d-flex align-items-center gap-2">
                <label for="dateFilter" class="form-label mb-0" style="color: var(--ss-sand);">Giorno:</label>
                <input type="date" id="dateFilter" class="form-control" style="max-width: 200px;">
            </div>
        </div>
        <div id="ordersList" class="row g-3"></div>
        <p id="noOrders" class="text-center mt-5 d-none" style="color: var(--ss-gray);">
            Nessun ordine per il giorno selezionato.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const role = JSON.parse(atob(token.split('.')[1])).usrType;
        if (role !== 'ristoratore') window.location.href = '/';

        const STATUS_LABELS = {
            'ordinato':        { label: 'Ordinato',        variant: 'secondary', icon: 'bi-check-circle' },
            'in_preparazione': { label: 'In preparazione', variant: 'warning',   icon: 'bi-fire' },
            'in_consegna':     { label: 'In consegna',     variant: 'info',      icon: 'bi-truck' },
            'consegnato':      { label: 'Consegnato',      variant: 'success',   icon: 'bi-bag-check' }
        };
        const STATUS_FLOW = ['ordinato', 'in_preparazione', 'in_consegna'];

        function statusBadge(status) {
            const s = STATUS_LABELS[status] || { label: status, variant: 'secondary', icon: 'bi-question' };
            return `<span class="badge bg-${s.variant}"><i class="bi ${s.icon} me-1"></i>${s.label}</span>`;
        }

        function nextStatus(status) {
            const idx = STATUS_FLOW.indexOf(status);
            return idx === -1 || idx === STATUS_FLOW.length - 1 ? null : STATUS_FLOW[idx + 1];
        }

        function advanceButton(order) {
            const next = nextStatus(order.status);
            if (!next) return '';
            return `<button class="btn-add btn-sm mt-2" onclick="advanceStatus('${order._id}', '${next}')">
                <i class="bi bi-arrow-right me-1"></i>Avanza a: ${STATUS_LABELS[next].label}
            </button>`;
        }

        function formatTime(dateString) {
            return new Date(dateString).toLocaleString('it-IT', {
                hour: '2-digit', minute: '2-digit'
            });
        }

        function deliveryInfo(delivery) {
            if (delivery.dove === 'domicilio') {
                return `<i class="bi bi-house-door me-1"></i>Consegna: ${delivery.indirizzo}`;
            }
            return `<i class="bi bi-shop me-1"></i>Ritiro al ristorante`;
        }

        async function loadOrders() {
            const date = document.getElementById('dateFilter').value;
            const list = document.getElementById('ordersList');
            const noMsg = document.getElementById('noOrders');

            const url = date ? `/api/orders/restaurant?date=${date}` : '/api/orders/restaurant';
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) {
                list.innerHTML = '';
                noMsg.classList.remove('d-none');
                noMsg.textContent = 'Errore nel caricamento degli ordini';
                return;
            }

            const orders = await res.json();

            if (orders.length === 0) {
                list.innerHTML = '';
                noMsg.classList.remove('d-none');
                noMsg.textContent = 'Nessun ordine per il giorno selezionato.';
                return;
            }
            noMsg.classList.add('d-none');

            list.innerHTML = orders.map(order => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="cart-card card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div>
                                    <h6 class="mb-1">Ordine #${order._id.slice(-6)}</h6>
                                    <p class="text-muted small mb-0"><i class="bi bi-clock me-1"></i>${formatTime(order.date)}</p>
                                </div>
                                ${statusBadge(order.status)}
                            </div>

                            <p class="small mb-1"><i class="bi bi-people me-1"></i>${order.people} ${order.people > 1 ? 'persone' : 'persona'}</p>
                            <p class="small mb-2">${deliveryInfo(order.delivery)}</p>

                            <hr class="my-2">

                            <div class="mb-2">
                                ${order.items.map(item => `
                                    <div class="d-flex justify-content-between small">
                                        <span>${item.menuItem?.strMeal || 'Piatto'} × ${item.quantity}</span>
                                        <span>€${(item.price * item.quantity).toFixed(2)}</span>
                                    </div>
                                `).join('')}
                            </div>

                            ${(order.delivery_cost ?? 0) > 0 ? `
                                <div class="d-flex justify-content-between small" style="color: var(--ss-teal);">
                                    <span>Costo consegna</span>
                                    <span>€${order.delivery_cost.toFixed(2)}</span>
                                </div>
                            ` : ''}

                            <div class="d-flex justify-content-between fw-bold mt-2" style="color: var(--ss-teal);">
                                <span>Totale</span>
                                <span>€${order.total.toFixed(2)}</span>
                            </div>

                            ${advanceButton(order)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function advanceStatus(orderId, newStatus) {
            const res = await fetch(`/api/orders/${orderId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            });
            if (res.ok) {
                loadOrders();
            } else {
                alert('Errore nel cambio di stato');
            }
        }

        // Init: default = oggi
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateFilter').value = today;
        document.getElementById('dateFilter').addEventListener('change', loadOrders);

        loadOrders();
    </script>
</body>
</html>
