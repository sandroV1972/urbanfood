<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfShack - Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container py-5">
        <h2 class="section-title">Dashboard Ristoratore</h2>
        <div class="bg-white rounded-4 p-4 shadow-sm mb-4" id="myRestaurants">
            <div class="d-flex justify-content-between align-items-center">
                <h3 class="section-title mb-0">Il tuo ristorante</h3>
                <button class="btn btn-icon-sm" id="addRestaurantBtn" data-bs-toggle="modal" data-bs-target="#addRestaurantModal"><i class="bi bi-plus"></i></button>
            </div>
            <div id="restaurantsList" class="row g-3 mt-2"></div>
            <p id="noRestaurants" class="text-center mt-3 d-none" style="color: var(--ss-gray);">
                Non hai ancora ristoranti. <a href="/restaurants" style="color: var(--ss-teal);">Aggiungine uno</a>
            </p>
        </div>
        <div class="bg-white rounded-4 p-4 shadow-sm" id="latestOrders">
            <h3 class="section-title">Ordini recenti</h3>
            <p style="color: var(--ss-gray);">Nessun ordine per ora.</p>
        </div>
    </div>


    <!-- Modale Aggiungi Ristorante -->
    <div class="modal fade" id="addRestaurantModal" tabindex="-1" aria-labelledby="addRestaurantModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h4 class="modal-title section-title" id="addRestaurantModalLabel">Aggiungi ristorante</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
                </div>
                <div class="modal-body">
                    <form id="restaurantForm">
                        <input type="hidden" id="editId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="piva" class="form-label">Partita IVA</label>
                                <input type="text" class="form-control" id="piva" required>
                            </div>
                            <div class="col-md-6">
                                <label for="address" class="form-label">Indirizzo</label>
                                <input type="text" class="form-control" id="address" required>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Telefono</label>
                                <input type="text" class="form-control" id="phone" required>
                            </div>
                            <div class="col-12">
                                <label for="description" class="form-label">Descrizione</label>
                                <textarea class="form-control" id="description" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label for="image" class="form-label">Immagine</label>
                                <input type="file" class="form-control" id="image" accept="image/*">
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary me-2" id="submitBtn">Aggiungi</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="toastMessage" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Se non loggato, torna alla homepage
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.usrType !== 'ristoratore') {
            window.location.href = '/';
        }

        // Carica i ristoranti del ristoratore
        async function loadRestaurants() {
            try {
                const res = await fetch('/api/restaurants', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Errore nel caricamento');
                const restaurants = await res.json();
                const list = document.getElementById('restaurantsList');
                const noMsg = document.getElementById('noRestaurants');

                const addBtn = document.getElementById('addRestaurantBtn');
                if (!Array.isArray(restaurants) || restaurants.length === 0) {
                    noMsg.classList.remove('d-none');
                    addBtn.classList.remove('d-none');
                    return;
                }
                noMsg.classList.add('d-none');
                addBtn.classList.add('d-none');

                list.innerHTML = restaurants.map(r => `
                    <div class="col-12">
                        <div class="d-flex align-items-start p-3 rounded-4 position-relative" style="background: var(--ss-dark-blue, #1a1a2e);">
                            <div class="flex-grow-1 me-3">
                                <h4 style="color: var(--ss-sand); font-family: 'Permanent Marker', cursive;">${r.name}</h4>
                                <p class="mb-1" style="color: var(--ss-gray); font-size: 0.9rem;">
                                    <i class="bi bi-geo-alt"></i> ${r.address}
                                </p>
                                <p class="mb-0" style="color: var(--ss-gray); font-size: 0.9rem;">
                                    <i class="bi bi-telephone"></i> ${r.phone}
                                </p>
                            </div>
                            ${r.image ? `
                            <div style="flex: 0 0 25%; max-width: 200px; min-width: 80px;">
                                <img src="${r.image}" class="w-100 rounded-4 card-glow" alt="${r.name}" style="aspect-ratio: 3/2; object-fit: cover;">
                            </div>` : ''}
                            <a href="/restaurants/${r._id}?edit=true" class="position-absolute" style="top: 10px; right: 10px;">
                                <i class="bi bi-pencil-fill text-white"></i>
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Errore caricamento ristoranti:', err);
            }
        }

        // Submit form nuovo ristorante
        document.getElementById('restaurantForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('piva', document.getElementById('piva').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('description', document.getElementById('description').value);
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            try {
                const res = await fetch('/api/restaurants', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                if (!res.ok) throw new Error('Errore nella creazione');
                bootstrap.Modal.getInstance(document.getElementById('addRestaurantModal')).hide();
                document.getElementById('restaurantForm').reset();
                loadRestaurants();
            } catch (err) {
                console.error('Errore creazione ristorante:', err);
            }
        });

        loadRestaurants();
    </script>
</body>
</html>
