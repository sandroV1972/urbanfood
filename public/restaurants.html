<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfShack - Gestione Ristoranti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="section-title mb-0">Gestione Ristoranti</h2>
            <a href="/dashboard" class="btn btn-primary"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>

        <!-- Form nuovo ristorante -->
        <div class="bg-light rounded-4 p-4 mb-4">
            <h4 class="section-title" id="formTitle">Aggiungi ristorante</h4>
            <form id="restaurantForm">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="piva" class="form-label">Partita IVA</label>
                        <input type="text" class="form-control" id="piva" required>
                    </div>
                    <div class="col-md-6">
                        <label for="address" class="form-label">Indirizzo</label>
                        <input type="text" class="form-control" id="address" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Telefono</label>
                        <input type="text" class="form-control" id="phone" required>
                    </div>
                    <div class="col-12">
                        <label for="description" class="form-label">Descrizione</label>
                        <textarea class="form-control" id="description" rows="2"></textarea>
                    </div>
                    <div class="col-12">
                        <label for="image" class="form-label">URL Immagine</label>
                        <input type="text" class="form-control" id="image" placeholder="https://...">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary me-2" id="submitBtn">Aggiungi</button>
                        <button type="button" class="btn btn-secondary d-none" id="cancelBtn">Annulla</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Lista ristoranti -->
        <div class="bg-white rounded-4 p-4 shadow-sm">
            <h4 class="section-title">I tuoi ristoranti</h4>
            <div id="restaurantsList" class="row g-3 mt-2"></div>
            <p id="noRestaurants" class="text-center mt-3 d-none" style="color: var(--ss-gray);">
                Non hai ancora ristoranti.
            </p>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="toastMessage" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.usrType !== 'ristoratore') window.location.href = '/';

        const form = document.getElementById('restaurantForm');
        const editId = document.getElementById('editId');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Carica lista ristoranti
        async function loadRestaurants() {
            const res = await fetch('/api/restaurants', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const restaurants = await res.json();
            const list = document.getElementById('restaurantsList');
            const noMsg = document.getElementById('noRestaurants');

            if (restaurants.length === 0) {
                list.innerHTML = '';
                noMsg.classList.remove('d-none');
                return;
            }

            noMsg.classList.add('d-none');
            list.innerHTML = restaurants.map(r => `
                <div class="col-md-6">
                    <div class="card p-3" style="background: rgba(0,206,209,0.08); border: 1px solid rgba(0,206,209,0.2); border-radius: 16px;">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 style="color: var(--ss-sand); font-family: 'Permanent Marker', cursive;">${r.name}</h5>
                                <p class="mb-1" style="color: var(--ss-gray); font-size: 0.9rem;">
                                    <i class="bi bi-geo-alt"></i> ${r.address}
                                </p>
                                <p class="mb-1" style="color: var(--ss-gray); font-size: 0.9rem;">
                                    <i class="bi bi-telephone"></i> ${r.phone}
                                </p>
                                <p class="mb-0" style="color: var(--ss-gray); font-size: 0.9rem;">
                                    <i class="bi bi-building"></i> P.IVA: ${r.piva}
                                </p>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-primary me-1" onclick="editRestaurant('${r._id}')">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteRestaurant('${r._id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Submit form (crea o modifica)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const body = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                piva: document.getElementById('piva').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value
            };

            const isEdit = editId.value !== '';
            const url = isEdit ? `/api/restaurants/${editId.value}` : '/api/restaurants';
            const method = isEdit ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (res.ok) {
                showToast(isEdit ? 'Ristorante aggiornato' : 'Ristorante creato');
                resetForm();
                loadRestaurants();
            } else {
                showToast(data.error, false);
            }
        });

        // Modifica: compila il form con i dati del ristorante
        async function editRestaurant(id) {
            const res = await fetch(`/api/restaurants/${id}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const r = await res.json();

            editId.value = r._id;
            document.getElementById('name').value = r.name;
            document.getElementById('address').value = r.address;
            document.getElementById('phone').value = r.phone;
            document.getElementById('piva').value = r.piva;
            document.getElementById('description').value = r.description || '';
            document.getElementById('image').value = r.image || '';

            formTitle.textContent = 'Modifica ristorante';
            submitBtn.textContent = 'Salva modifiche';
            cancelBtn.classList.remove('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cancella ristorante
        async function deleteRestaurant(id) {
            if (!confirm('Sei sicuro di voler cancellare questo ristorante?')) return;

            const res = await fetch(`/api/restaurants/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const data = await res.json();

            if (res.ok) {
                showToast('Ristorante cancellato');
                loadRestaurants();
            } else {
                showToast(data.error, false);
            }
        }

        // Reset form dopo submit o annulla
        function resetForm() {
            form.reset();
            editId.value = '';
            formTitle.textContent = 'Aggiungi ristorante';
            submitBtn.textContent = 'Aggiungi';
            cancelBtn.classList.add('d-none');
        }

        cancelBtn.addEventListener('click', resetForm);

        loadRestaurants();
    </script>
</body>
</html>
