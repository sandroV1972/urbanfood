<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfShack - I miei ordini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container py-5">
        <h2 class="section-title">I miei ordini</h2>
        <p class="section-subtitle">Guarda i tuoi ordini di oggi o passati</p>

        <ul class="nav nav-tabs mb-4" id="searchTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-today" data-bs-toggle="tab" data-bs-target="#pane-today" type="button" role="tab">
                    <i class="bi bi-egg-fried me-1"></i>Oggi
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-historical" data-bs-toggle="tab" data-bs-target="#pane-historical" type="button" role="tab">
                    <i class="bi bi-clock me-1"></i>Storico
                </button>
            </li>
        </ul>
        <div class="tab-content">
            <div id="ordersContainer" class="mt-4">
            </div>
        </div>
    </div>
    <!-- Modale review ristorante -->
    <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 flex-column text-center pt-4 position-relative">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    <img id="reviewModalImage" src="" alt=""
                         class="rounded-circle mb-2 card-glow"
                         style="width: 90px; height: 90px; object-fit: cover; border: 2px solid var(--ss-teal);">
                    <p class="text-muted small mb-1">Stai recensendo</p>
                    <h4 id="reviewModalRestaurant" class="mb-0"
                        style="color: var(--ss-teal); font-family: 'Permanent Marker', cursive;"></h4>
                </div>
                <div class="modal-body">
                    <div class="mb-3 text-center">
                        <label class="form-label fw-bold d-block">Voto</label>
                        <div id="ratingStars" class="fs-3" style="cursor: pointer; color: var(--ss-gray);">
                            <i class="bi bi-star" data-value="1"></i>
                            <i class="bi bi-star" data-value="2"></i>
                            <i class="bi bi-star" data-value="3"></i>
                            <i class="bi bi-star" data-value="4"></i>
                            <i class="bi bi-star" data-value="5"></i>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="comment" class="form-label fw-bold">Il tuo commento</label>
                        <textarea class="form-control" id="comment" rows="3" placeholder="Com'è stata la tua esperienza?"></textarea>
                    </div>
                </div>
                <div class="modal-footer justify-content-center">
                    <button class="btn-add" onclick="addReviewFromModal()">
                        <i class="bi bi-pencil me-1"></i> Aggiungi recensione
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const role = JSON.parse(atob(token.split('.')[1])).usrType;
        if (role !== 'cliente') window.location.href = '/';

        const STATUS_LABELS = {
            'ordinato':        { label: 'Ordinato',        variant: 'secondary', icon: 'bi-check-circle' },
            'in_preparazione': { label: 'In preparazione', variant: 'warning',   icon: 'bi-fire' },
            'in_consegna':     { label: 'In consegna',     variant: 'info',      icon: 'bi-truck' },
            'consegnato':      { label: 'Consegnato',      variant: 'success',   icon: 'bi-bag-check' }
        };

        function statusBadge(status) {
            const s = STATUS_LABELS[status] || { label: status, variant: 'secondary', icon: 'bi-question' };
            return `<span class="badge bg-${s.variant}"><i class="bi ${s.icon} me-1"></i>${s.label}</span>`;
        }

        function confirmDelivery(delivery, status, order) {
            if (delivery.dove === 'domicilio' && status != 'consegnato') {
                return `<button class="btn-add" onclick="orderArrived('${order}')"><i class="bi bi-truck me-1"></i>Conferma consegna</button>`;
            } else {
                return ``;
            }
        }

        function orderArrived(id) {
            fetch(`/api/orders/${id}/status`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ status: 'consegnato' })
            })
            .then(res => {
                if (res.ok) location.reload();
                else alert('Errore nel confermare la consegna');
            })
            .catch(err => console.error(err));
        };     

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString('it-IT', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function deliveryInfo(delivery) {
            if (delivery.dove === 'domicilio') {
                return `<i class="bi bi-house-door me-1"></i>Consegna a DOMICILIO: ${delivery.indirizzo}`;
            }
            return `<i class="bi bi-shop me-1"></i>Ritiro al ristorante`;
        }

        function reviewButton(order, reviewedRestaurantIds) {
            if (!reviewedRestaurantIds.has(order.restaurant._id)) return `<button class="btn-add btn-sm mt-2" onclick="showReviewModal('${order.restaurant._id}')"><i class="bi bi-pencil me-1"></i>Recensione</button>`;
            else return `<span class="text-muted small ms-2"><i class="bi bi-check-circle"></i> Recensito</span>`;
        }

        async function showReviewModal(restaurantId) {
            const modal = new bootstrap.Modal(document.getElementById('reviewModal'));

            const res = await fetch(`/api/restaurants/order/${restaurantId}`);
            if (!res.ok) {
                alert('Errore nel caricare il ristorante');
                return;
            }
            const r = await res.json();
            document.getElementById('reviewModalImage').src = r.image || 'https://via.placeholder.com/150';
            document.getElementById('reviewModalImage').alt = r.name;
            document.getElementById('reviewModalRestaurant').textContent = r.name;

            // Reset stelle e commento all'apertura
            currentRating = 0;
            document.querySelectorAll('#ratingStars i').forEach(s => s.className = 'bi bi-star');
            document.getElementById('comment').value = '';

            document.getElementById('reviewModal').dataset.restaurantId = restaurantId;
            modal.show();
        }

        // Gestione stelle del rating
        let currentRating = 0;
        document.querySelectorAll('#ratingStars i').forEach(star => {
            star.addEventListener('click', () => {
                currentRating = Number(star.dataset.value);
                document.querySelectorAll('#ratingStars i').forEach(s => {
                    s.className = Number(s.dataset.value) <= currentRating
                        ? 'bi bi-star-fill text-warning'
                        : 'bi bi-star';
                });
            });
        });

        async function addReviewFromModal() {
           const restaurantId = document.getElementById('reviewModal').dataset.restaurantId;
           const rating = currentRating;
           const comment = document.getElementById('comment').value;

           const res = await fetch(`/api/reviews/`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    "restaurant": restaurantId,
                    "rating": rating,
                    "comment": comment 
                }) 
           });
           if (res.ok) {
               location.reload();
           } else {
               alert('Errore nella creazione della recensione');
           }
        }

        async function loadOrders(period) {
            const reviewsRes = await fetch('/api/reviews/mine', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const myReviews = await reviewsRes.json();
            const reviewedRestaurantIds = new Set(myReviews.map(r => r.restaurant._id));
            const container = document.getElementById('ordersContainer');
            
                const res = await fetch(`/api/orders?period=${period}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

            if (!res.ok) {
                container.innerHTML = '<p class="text-center mt-5">Errore nel caricamento degli ordini</p>';
                return;
            }

            const orders = await res.json();

            if (orders.length === 0) {
                const message = period === 'today' ? 'Nessun ordine oggi' : 'Nessun ordine nel periodo scelto';
                container.innerHTML = `
                    <div class="text-center mt-5">
                        <i class="bi bi-bag-x" style="font-size: 3rem; color: var(--ss-gray);"></i>
                        <p class="mt-3">${message}</p>
                        <a href="/" class="btn-add d-inline-block mt-2">Esplora i ristoranti</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="cart-card card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <h5 class="card-title mb-1">${order.restaurant?.name || 'Ristorante'}</h5>
                                <p class="text-muted small mb-0"><i class="bi bi-clock me-1"></i>${formatDate(order.date)}</p>
                            </div>
                            ${statusBadge(order.status)}
                        </div>

                        <p class="mb-1 small"><i class="bi bi-people me-1"></i>${order.people} ${order.people > 1 ? 'persone' : 'persona'}</p>
                        <p class="mb-2 small">${deliveryInfo(order.delivery)}</p>

                        <hr class="my-2">

                        <div class="mb-2">
                            ${order.items.map(item => `
                                <div class="d-flex justify-content-between small">
                                    <span>${item.menuItem?.strMeal || 'Piatto'} × ${item.quantity}</span>
                                    <span>€${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>

                        ${(order.delivery_cost ?? 0) > 0 ? `
                            <div class="d-flex justify-content-between mt-2 small" style="color: var(--ss-teal);">
                                <span>Costo consegna</span>
                                <span>€${order.delivery_cost.toFixed(2)}</span>
                            </div>
                        ` : ''}
                        <div class="d-flex justify-content-between fw-bold mt-2" style="color: var(--ss-teal);">
                            <span>Totale</span>
                            <span>€${order.total.toFixed(2)}</span>
                        </div>

                        <div class="mt-3">
                            ${confirmDelivery(order.delivery, order.status, order._id)}
                            ${order.status === 'consegnato' ? reviewButton(order, reviewedRestaurantIds) : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        loadOrders('today');
        document.getElementById('tab-today').addEventListener('shown.bs.tab', () => {loadOrders('today');}
        );
        document.getElementById('tab-historical').addEventListener('shown.bs.tab', () => {loadOrders('past');}
        );
    </script>
</body>
</html>
